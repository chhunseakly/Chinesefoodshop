<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout Invoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/css/bootstrap.css" />

  <style>
    body {
      background: #f5f5f5;
    }

    .invoice-box {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .total-box {
      text-align: right;
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .btn-confirm {
      width: 100%;
      background: green;
      color: white;
      border: none;
      padding: 12px;
      margin-top: 20px;
      border-radius: 5px;
    }

    .btn-back {
      width: 100%;
      background: #ccc;
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="invoice-box">

  <h2>🧾 Order Invoice</h2>
  <p>Thank you for your order 🍜</p>

  <div id="order-list"></div>

  <div class="total-box">
    Total: $<span id="total">0</span>
  </div>

  <button class="btn-confirm" onclick="confirmOrder()">
    Confirm Order 💳
  </button>

  <button class="btn-back" onclick="goBack()">
    Back to Shop
  </button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let list = document.getElementById("order-list");
let total = 0;

cart.forEach(item => {
  total += item.price * item.qty;

  list.innerHTML += `
    <div class="item">
      <div>
        <b>${item.name}</b><br>
        ${item.qty} × $${item.price}
      </div>

      <div>
        $${(item.price * item.qty).toFixed(2)}
      </div>
    </div>
  `;
});

document.getElementById("total").innerText = total.toFixed(2);

function confirmOrder() {
  alert("Order placed successfully 🍜");
  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
